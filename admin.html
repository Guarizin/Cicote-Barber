<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Cicote Barber</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .admin-shell {
      width: min(1120px, 92%);
      margin: 0 auto;
      padding: 6.2rem 0 3.4rem;
    }

    .admin-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.05rem 4%;
      background: rgba(8, 8, 8, 0.82);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(181, 149, 60, 0.16);
    }

    .admin-brand {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-gold);
      font-weight: 600;
      font-size: 1rem;
    }

    .admin-link {
      border: 1px solid var(--color-divider);
      padding: 0.56rem 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }

    .admin-link:hover {
      border-color: var(--color-gold);
      color: var(--color-gold);
      transform: translateY(-1px);
    }

    .admin-brand:focus-visible,
    .admin-link:focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 2px;
    }

    .admin-panel {
      border: 1px solid var(--color-divider);
      background-color: var(--color-black-soft);
      padding: 1.4rem;
    }

    .admin-panel h1 {
      color: var(--color-white);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.15;
      margin-bottom: 0.8rem;
      max-width: 22ch;
      letter-spacing: normal;
      text-transform: none;
    }

    .admin-panel p {
      color: rgba(244, 244, 244, 0.78);
      line-height: 1.65;
      max-width: 62ch;
    }

    .admin-note {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(181, 149, 60, 0.18);
      color: rgba(244, 244, 244, 0.62);
      font-size: 0.92rem;
    }

    .admin-state {
      margin-top: 1.1rem;
      padding: 0.9rem 0;
      border-top: 1px solid rgba(181, 149, 60, 0.18);
      color: rgba(244, 244, 244, 0.78);
      min-height: 1.5rem;
    }

    .admin-state.is-error {
      color: #fca5a5;
    }

    .table-wrap {
      margin-top: 1rem;
      border: 1px solid rgba(181, 149, 60, 0.2);
      background-color: rgba(255, 255, 255, 0.01);
      overflow-x: auto;
    }

    .appointments-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    .appointments-table thead th {
      text-align: left;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(244, 244, 244, 0.66);
      border-bottom: 1px solid rgba(181, 149, 60, 0.25);
      padding: 0.72rem 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .appointments-table tbody td {
      padding: 0.72rem 0.8rem;
      border-bottom: 1px solid rgba(181, 149, 60, 0.12);
      color: rgba(244, 244, 244, 0.9);
      font-size: 0.92rem;
      vertical-align: top;
    }

    .appointments-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .status-pill {
      border: 1px solid rgba(181, 149, 60, 0.28);
      color: var(--color-gold);
      padding: 0.12rem 0.45rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hide {
      display: none;
    }

    @media (max-width: 540px) {
      .admin-shell {
        width: min(880px, 90%);
        padding-top: 5.8rem;
      }

      .admin-link {
        padding: 0.5rem 0.76rem;
      }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <a class="admin-brand" href="index.html">Cicote Barber</a>
    <a class="admin-link" href="index.html">Voltar para home</a>
  </header>

  <main class="admin-shell">
    <section class="admin-panel" aria-labelledby="admin-title">
      <h1 id="admin-title">Agendamentos recebidos</h1>
      <p>Painel demonstrativo somente leitura para acompanhar os registros enviados pelo formulario.</p>
      <p class="admin-note">Ordenacao: mais recentes primeiro.</p>

      <div id="admin-state" class="admin-state" role="status" aria-live="polite">Carregando agendamentos...</div>

      <div class="table-wrap hide" id="table-wrap" aria-label="Tabela de agendamentos">
        <table class="appointments-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Servico</th>
              <th>Data</th>
              <th>Horario</th>
              <th>Status</th>
              <th>Criado em</th>
            </tr>
          </thead>
          <tbody id="appointments-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
